
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lottery Number Generator</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <button id="theme-toggle" title="Toggle Dark Mode">🌙</button>
        <h1>Lottery Number Generator</h1>
        <p>Click the button to generate your lucky numbers!</p>
        <div class="numbers">
            <!-- Numbers will be generated here -->
        </div>
        <button id="generate">Generate Numbers</button>

        <div class="contact-section">
            <hr>
            <h3>Contact Us</h3>
            <form action="https://formspree.io/f/myklnojj" method="POST" id="contact-form">
                <div class="form-group">
                    <input type="text" name="name" placeholder="Your Name" required>
                </div>
                <div class="form-group">
                    <input type="tel" name="contact" placeholder="Your Phone Number" required>
                </div>
                <button type="submit" id="submit-btn">Send Message</button>
            </form>
        </div>
    </div>
    <script src="main.js"></script>
</body>
</html>
